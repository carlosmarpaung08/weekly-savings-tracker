<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  {/* The main coin fills the entire outer circle */}
  <circle cx="16" cy="16" r="16" fill="url(#coinGrad)" />
  {/* Inner ring */}
  <circle cx="16" cy="16" r="12.5" fill="none" stroke="rgba(255,255,255,0.3)" strokeWidth="1.2" />
  {/* Rp symbol */}
  <text
    x="16" y="21.5"
    text-anchor="middle"
    font-size="11.5"
    font-weight="900"
    font-family="Inter, system-ui, sans-serif"
    fill="white"
    letter-spacing="-0.5"
  >Rp</text>
  <defs>
    <linearGradient id="coinGrad" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stopColor="#818cf8" />
      <stop offset="50%" stopColor="#6366f1" />
      <stop offset="100%" stopColor="#4f46e5" />
    </linearGradient>
  </defs>
</svg>